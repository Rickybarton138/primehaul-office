{% extends "base_app.html" %}
{% set active_nav = "jobs" %}
{% block title %}Add Job — {{ company.company_name }}{% endblock %}

{% block content %}
<div class="max-w-3xl">
    <h1 class="text-2xl font-bold text-white mb-6">Add Job</h1>

    <form method="POST" action="/jobs/add" class="space-y-6">
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 space-y-4">
            <h2 class="text-white font-semibold mb-2">Customer</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Name *</label>
                    <input type="text" name="customer_name" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Email</label>
                    <input type="email" name="customer_email" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Phone</label>
                    <input type="tel" name="customer_phone" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
            </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 space-y-4">
            <h2 class="text-white font-semibold mb-2">Locations</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Pickup Address</label>
                    <input type="text" name="pickup_address" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Pickup Postcode</label>
                    <input type="text" name="pickup_postcode" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Dropoff Address</label>
                    <input type="text" name="dropoff_address" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Dropoff Postcode</label>
                    <input type="text" name="dropoff_postcode" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
            </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 space-y-4">
            <h2 class="text-white font-semibold mb-2">Job Details</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Property Type</label>
                    <select name="property_type" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                        <option value="">Select...</option>
                        {% for t in ["Studio", "1 Bed Flat", "2 Bed Flat", "2 Bed House", "3 Bed House", "4 Bed House", "5+ Bed House", "Office", "Storage"] %}
                        <option value="{{ t }}">{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Total CBM</label>
                    <input type="number" name="total_cbm" step="0.1" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Total Items</label>
                    <input type="number" name="total_items" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Special Requirements</label>
                <textarea name="special_requirements" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none"></textarea>
            </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 space-y-4">
            <h2 class="text-white font-semibold mb-2">Scheduling & Pricing</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Date</label>
                    <input type="date" name="scheduled_date" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Start Time</label>
                    <input type="time" name="scheduled_start_time" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Est. Duration (hours)</label>
                    <input type="number" name="estimated_duration_hours" step="0.5" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Vehicle</label>
                    <select name="vehicle_id" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                        <option value="">None</option>
                        {% for v in vehicles %}<option value="{{ v.id }}">{{ v.registration }} — {{ v.vehicle_type|replace("_"," ") }}</option>{% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Quoted Price (£)</label>
                    <input type="number" name="quoted_price" step="0.01" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Source</label>
                    <select name="source" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                        {% for s in ["manual", "primehaul_leads", "comparemymove", "anyvan", "phone", "website", "referral"] %}
                        <option value="{{ s }}">{{ s|replace("_"," ")|capitalize }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Notes</label>
                <textarea name="notes" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none"></textarea>
            </div>
        </div>

        <div class="flex gap-3">
            <button type="submit" class="bg-prime text-prime-dark font-semibold px-6 py-2.5 rounded-lg hover:bg-green-300 transition">Add Job</button>
            <a href="/jobs" class="text-gray-400 hover:text-white px-6 py-2.5 rounded-lg border border-gray-600 text-sm">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
