{% extends "base.html" %}
{% block title %}Log In — PrimeHaul Office Manager{% endblock %}

{% block body %}
<div class="min-h-screen bg-prime-dark flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-8 h-8 bg-prime rounded-lg flex items-center justify-center font-bold text-prime-dark text-sm">PH</div>
                <span class="text-white font-semibold text-lg">Office Manager</span>
            </a>
        </div>

        <div class="bg-prime-light border border-gray-700 rounded-2xl p-8">
            <h1 class="text-2xl font-bold text-white mb-6">Log in</h1>

            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg p-3 mb-4 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Email</label>
                    <input type="email" name="email" required
                        class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:border-prime focus:outline-none">
                </div>
                <button type="submit"
                    class="w-full bg-prime text-prime-dark font-semibold py-2.5 rounded-lg hover:bg-green-300 transition">
                    Log in
                </button>
            </form>

            <p class="text-gray-500 text-sm mt-4 text-center">
                Don't have an account? <a href="/signup" class="text-prime hover:underline">Start free trial</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
